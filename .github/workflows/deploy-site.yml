name: Trigger site rebuild

# openraga.org renders its catalog from the example documents in this repo at
# build time. On every change to the examples, ask Vercel to rebuild the site.
on:
  push:
    branches: [main]
    paths:
      - "examples/**"

jobs:
  deploy-hook:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::notice::VERCEL_DEPLOY_HOOK_URL secret is not set — skipping site rebuild trigger"
            exit 0
          fi
          curl -sS -X POST "$DEPLOY_HOOK_URL" > /dev/null
          echo "openraga.org rebuild triggered"
